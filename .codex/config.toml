# OpenAI Codex CLI — project configuration
# Docs: https://github.com/openai/codex/blob/main/docs/config.md
# Sample: https://developers.openai.com/codex/config-sample

# Default model for this workspace. Override per-session with `codex --model`.
# Valid IDs (as of Codex v0.130.0): gpt-5.5 (default frontier),
# gpt-5.4, gpt-5.4-mini, gpt-5.3-codex (coding-optimized), gpt-5.2.
model = "gpt-5.3-codex"

# Sandbox: workspace-write lets Codex edit files inside this repo but blocks
# changes outside it. Use `danger-full-access` only for hook-port debugging.
sandbox = "workspace-write"

# Approval: on-request means Codex asks before running commands flagged risky
# by the sandbox. Matches the "ask before write" protocol in AGENTS.md.
approval_policy = "on-request"

# Skills live at .agents/skills/<name>/SKILL.md (Codex CLI auto-discovers).
# Invoke with the $ prefix (e.g. $start, $agent-game-designer) or describe
# the task in natural language. The / prefix is reserved for built-in
# Codex commands.

# Lifecycle hooks — TOML arrays of tables with PascalCase event names.
# Project-local hooks require the user to trust this project on first run.
# Event names use PascalCase: SessionStart, PreToolUse, PostToolUse,
# UserPromptSubmit, PermissionRequest, Stop.

[hooks]

# Print branch / sprint / milestone / bug-count context at session start,
# and chain into detect-gaps.sh to spot missing documentation.
[[hooks.SessionStart]]

[[hooks.SessionStart.hooks]]
type = "command"
command = "bash .codex/hooks/session-start.sh"
timeout = 10

# Validate git commit / push commands before they execute. The matcher
# fires for any Bash tool invocation; the scripts internally short-circuit
# when the command is not a git commit/push.
[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "bash .codex/hooks/validate-commit.sh"
timeout = 15

[[hooks.PreToolUse.hooks]]
type = "command"
command = "bash .codex/hooks/validate-push.sh"
timeout = 10

# Asset-pipeline + skill-change validators after any Write/Edit. Both
# scripts exit 0 silently on non-matching paths, so the matcher is broad.
[[hooks.PostToolUse]]
matcher = "^(Write|Edit)$"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "bash .codex/hooks/validate-assets.sh"
timeout = 10

[[hooks.PostToolUse.hooks]]
type = "command"
command = "bash .codex/hooks/validate-skill-change.sh"
timeout = 5

# MCP servers. Token-bearing servers (Datadog, Sentry, etc) belong in
# user-level ~/.codex/config.toml, not committed here.
[mcp_servers]
# Example shape — uncomment per machine:
# [mcp_servers.context7]
# command = "npx"
# args = ["-y", "@upstash/context7-mcp@latest"]

# NOTE: `notify` is user-level only (see Codex docs) and uses argv-array
# format (e.g. `notify = ["notify-send", "Codex"]`). The bundled
# .codex/hooks/notify.sh is preserved for users who want to wire it in
# their own ~/.codex/config.toml.
